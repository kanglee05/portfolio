<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Analysis</title>
    <link rel="stylesheet" href="../style.css">
    <script type="module" src="../global.js"></script>
    
    <!-- Link the new JavaScript file -->
    <script type="module" src="main.js" defer></script>
</head>
<body>
    <h1>Meta Analysis</h1>
    <p>Visualizing the stats of my codebase.</p>

    <!-- Step 1.1: Placeholder for stats -->
    <div id="stats"></div>

    <h2>Commits by time of day</h2>
    <!-- Step 2.1: Placeholder for the scatterplot -->
    <div id="chart"></div>
  
    <!-- Step 5.5 & 5.6: Selection Data Elements -->
    <p id="selection-count">No commits selected</p>
    <dl id="language-breakdown" class="stats"></dl>

    <!-- Step 3.1 & 3.3: Tooltip Element (hidden by default) -->
    <dl id="commit-tooltip" class="info tooltip" hidden>
        <dt>Commit</dt>
        <dd><a href="" id="commit-link" target="_blank"></a></dd>

        <dt>Date</dt>
        <dd id="commit-date"></dd>

        <dt>Time</dt>
        <dd id="commit-time"></dd>

        <dt>Author</dt>
        <dd id="commit-author"></dd>

        <dt>Lines Edited</dt>
        <dd id="commit-lines"></dd>
    </dl>

</body>
</html>
